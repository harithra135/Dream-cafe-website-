<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🛒 Order | Dream Cafe</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#FFE29F,#FFA99F,#FF719A);
background-size:400% 400%;
animation:bg 10s infinite alternate;
}

@keyframes bg{
0%{background-position:left;}
100%{background-position:right;}
}

header{
background:rgba(255,255,255,.2);
backdrop-filter:blur(15px);
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:35px;
font-weight:bold;
color:white;
text-shadow:3px 3px 10px black;
}

nav a{
text-decoration:none;
margin:15px;
font-size:18px;
color:white;
font-weight:bold;
}

nav a:hover{
color:yellow;
}

.container{
width:70%;
margin:40px auto;
background:rgba(255,255,255,.2);
backdrop-filter:blur(20px);
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.3);
}

h1{
text-align:center;
color:white;
margin-bottom:20px;
text-shadow:3px 3px 10px black;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
color:white;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:10px;
font-size:16px;
}

textarea{
height:100px;
resize:none;
}

.radio{
width:auto;
}

.checkbox{
width:auto;
}

button{
margin-top:25px;
width:100%;
padding:15px;
border:none;
border-radius:30px;
font-size:20px;
background:#ff4d6d;
color:white;
cursor:pointer;
transition:.5s;
}

button:hover{
background:#ff0066;
transform:scale(1.05);
}

footer{
margin-top:40px;
background:#3d2c29;
color:white;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<header>

<div class="logo">
☕ Dream Cafe
</div>

<nav>

<a href="index.html">🏠 Home</a>

<a href="menu.html">🍔 Menu</a>

<a href="order.html">🛒 Order</a>

<a href="contact.html">📞 Contact</a>

</nav>

</header>

<div class="container">

<h1>🛒 Place Your Order ☕</h1>

<form>

<label>👤 Customer Name</label>
<input type="text" placeholder="Enter your name">

<label>📧 Email</label>
<input type="email" placeholder="Enter email">

<label>📱 Phone Number</label>
<input type="tel" placeholder="9876543210">

<label>🍽️ Select Food</label>

<select>

<option>☕ Cappuccino</option>
<option>🍕 Pizza</option>
<option>🍔 Burger</option>
<option>🍰 Chocolate Cake</option>
<option>🥤 Milkshake</option>
<option>🍩 Donut</option>

</select>

<label>🔢 Quantity</label>
<input type="number" min="1" max="20">

<label>📅 Delivery Date</label>
<input type="date">

<label>🕒 Delivery Time</label>
<input type="time">

<label>🌶️ Spice Level</label>
<input type="range" min="1" max="10">

<label>🍫 Extra Toppings</label>

<input class="checkbox" type="checkbox"> Cheese 🧀

<input class="checkbox" type="checkbox"> Chocolate 🍫

<input class="checkbox" type="checkbox"> Ice Cream 🍨

<input class="checkbox" type="checkbox"> Whipped Cream 🍦

<br><br>

<label>🥤 Drink Size</label>

<input class="radio" type="radio" name="size"> Small

<input class="radio" type="radio" name="size"> Medium

<input class="radio" type="radio" name="size"> Large

<label>🎨 Choose Cup Color</label>

<input type="color">

<label>💳 Payment Method</label>

<select>

<option>💵 Cash</option>

<option>💳 Credit Card</option>

<option>📱 UPI</option>

<option>🏦 Net Banking</option>

</select>

<label>💌 Special Instructions</label>

<textarea placeholder="Write your message here..."></textarea>

<button type="submit">
💖 Place Order 💖
</button>

</form>

</div>

<footer>

☕ Dream Cafe ❤️

<br><br>

📍 Coimbatore

📞 +91 9876543210

📧 dreamcafe@gmail.com

<br><br>

Made with ❤️ Coffee

</footer>

</body>
</html>
