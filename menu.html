<title>🍽️ Dream Cafe Menu</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#FFE29F,#FFA99F,#FF719A);
background-size:400% 400%;
animation:bg 10s infinite alternate;
}

@keyframes bg{
0%{background-position:left;}
100%{background-position:right;}
}

header{
background:rgba(255,255,255,.2);
backdrop-filter:blur(15px);
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:35px;
font-weight:bold;
color:white;
text-shadow:3px 3px 10px black;
}

nav a{
text-decoration:none;
margin:15px;
color:white;
font-size:18px;
font-weight:bold;
transition:.4s;
}

nav a:hover{
color:yellow;
}

h1{
text-align:center;
margin:40px;
color:white;
font-size:50px;
text-shadow:3px 3px 10px black;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
padding:30px;
}

.card{
background:white;
width:250px;
padding:20px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,.3);
transition:.5s;
}

.card:hover{
transform:translateY(-10px) scale(1.05);
}

.card img{
width:180px;
height:150px;
border-radius:15px;
}

.card h2{
margin:10px;
}

.card p{
font-size:18px;
margin:10px;
}

button{
padding:10px 20px;
background:#ff4d6d;
color:white;
border:none;
border-radius:30px;
cursor:pointer;
font-size:18px;
transition:.4s;
}

button:hover{
background:#ff0066;
transform:scale(1.1);
}

footer{
background:#3d2c29;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>

</head>
